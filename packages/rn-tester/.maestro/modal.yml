appId: ${APP_ID} # iOS: com.meta.RNTester.localDevelopment | Android: com.facebook.react.uiapp
---
- launchApp
# Wait for the JS bundle to render the landing screen instead of asserting
# immediately, which races app cold start on CI.
- extendedWaitUntil:
    visible: 'Components'
    timeout: 30000
- scrollUntilVisible:
    element:
      id: 'Modal'
    direction: DOWN
    speed: 60
- tapOn:
    id: 'Modal'
- assertVisible:
    text: 'Show Modal'
- tapOn:
    text: 'Show Modal'
- assertVisible:
    text: 'Close'
- tapOn:
    text: 'Close'
- assertVisible:
    text: 'Show Modal'
