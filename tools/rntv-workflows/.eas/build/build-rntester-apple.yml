build:
  name: Build RNTester for Apple platforms
  steps:
    - eas/checkout
    - eas/install_node_modules
    - run:
        name: Set up build-specific environment
        working_directory: ../..
        command: |
          if [[ "$RNTESTER_CONFIGURATION" == "" ]]; then
            echo "RNTESTER_CONFIGURATION env variable must be either \"debug\" or \"release\""
            exit 1
          fi
          echo "Build ID for iOS/tvOS artifacts = $ARTIFACTS_BUILD_ID"
          # Set up environment for subsequent steps
          export ROOT_DIR=$PWD
          set-env ROOT_DIR $ROOT_DIR
          if [[ "$RNTV_RELEASE_BUILD" != "1" ]]; then
            . ./tools/rntv-workflows/override-nightly-build-version.sh
            echo "Hermes build from nightly build: $REACT_NATIVE_OVERRIDE_NIGHTLY_BUILD_VERSION"
            set-env REACT_NATIVE_OVERRIDE_NIGHTLY_BUILD_VERSION $REACT_NATIVE_OVERRIDE_NIGHTLY_BUILD_VERSION
            node ./scripts/releases/use-hermes-nightly.js
            yarn
            set-env HERMES_VERSION nightly
            set-env RN_DEP_VERSION nightly
          fi
          set-env RCT_USE_RN_DEP 1
    - run:
        name: Unpack build artifacts
        working_directory: .
        command: |
          DEBUG=eas:* npx eas-cli build:view $ARTIFACTS_BUILD_ID --json > build.json && true
          curl --output ../../react-native-artifacts.tgz `node -e 'console.log(require("./build.json").artifacts.buildArtifactsUrl)'`
          mkdir $ROOT_DIR/maven-local
          (cd $ROOT_DIR/maven-local; tar zxf ../react-native-artifacts.tgz)
    - run:
        name: Build RNTester for iOS using RNCore minimal artifacts
        working_directory: ../../packages/rn-tester
        command: |
          . ../../tools/rntv-workflows/ruby-env.sh
          mkdir $ROOT_DIR/RNTester-iOS-$RNTESTER_CONFIGURATION
          export RCT_USE_RN_DEP=1
          export RCT_USE_PREBUILT_RNCORE=1
          export RNTV_TESTONLY_LOCAL_RNCORE_REPOSITORY=file://$ROOT_DIR/maven-local
          echo "Building RNTester..."
          echo "Cleaning build directories..."
          yarn clean-ios
          echo "Setting up RNTester..."
          yarn setup-ios-hermes
          echo "Building RNTester..."
          if [[ "$RNTESTER_CONFIGURATION" == "release" ]]; then
            yarn build-ios-hermes-release
          else
            yarn build-ios-hermes
          fi
          echo "Build completed."
          cp -r $ROOT_DIR/packages/rn-tester/build/Build/Products/$RNTESTER_CONFIGURATION-iphonesimulator/RNTester.app $ROOT_DIR/RNTester-iOS-$RNTESTER_CONFIGURATION
          cp -r $ROOT_DIR/packages/rn-tester/build/Build/Products/$RNTESTER_CONFIGURATION-iphonesimulator/RNTester.app.dSYM $ROOT_DIR/RNTester-iOS-$RNTESTER_CONFIGURATION
    - run:
        name: Build RNTester for tvOS using RNCore artifacts
        working_directory: ../../packages/rn-tester
        command: |
          . ../../tools/rntv-workflows/ruby-env.sh
          mkdir $ROOT_DIR/RNTester-tvOS-$RNTESTER_CONFIGURATION
          export RCT_USE_RN_DEP=1
          export RCT_USE_PREBUILT_RNCORE=1
          export RNTV_TESTONLY_LOCAL_RNCORE_REPOSITORY=file://$ROOT_DIR/maven-local
          echo "Building RNTester..."
          echo "Cleaning build directories..."
          yarn clean-ios
          echo "Setting up RNTester..."
          yarn setup-tvos-hermes
          echo "Building RNTester..."
          if [[ "$RNTESTER_CONFIGURATION" == "release" ]]; then
            yarn build-tvos-hermes-release
          else
            yarn build-tvos-hermes
          fi
          echo "Build completed."
          cp -r $ROOT_DIR/packages/rn-tester/build/Build/Products/$RNTESTER_CONFIGURATION-appletvsimulator/RNTester.app $ROOT_DIR/RNTester-tvOS-$RNTESTER_CONFIGURATION
          cp -r $ROOT_DIR/packages/rn-tester/build/Build/Products/$RNTESTER_CONFIGURATION-appletvsimulator/RNTester.app.dSYM $ROOT_DIR/RNTester-tvOS-$RNTESTER_CONFIGURATION
    - run:
        name: Package RNTester artifacts
        working_directory: ../..
        command: |
          export REACT_NATIVE_VERSION=`npx tsx tools/rntv-workflows/src/get-react-native-version.ts`
          echo "REACT_NATIVE_VERSION: $REACT_NATIVE_VERSION"
          (cd RNTester-iOS-$RNTESTER_CONFIGURATION; tar zcf $ROOT_DIR/rntester-$REACT_NATIVE_VERSION-iphone-$RNTESTER_CONFIGURATION.tgz *)
          (cd RNTester-tvOS-$RNTESTER_CONFIGURATION; tar zcf $ROOT_DIR/rntester-$REACT_NATIVE_VERSION-appletv-$RNTESTER_CONFIGURATION.tgz *)
    - eas/upload_artifact:
        name: Upload RNTester artifacts
        inputs:
          type: build-artifact
          path: |
            rntester-*.tgz
